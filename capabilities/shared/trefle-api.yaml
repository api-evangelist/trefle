naftiko: "1.0.0-alpha1"

info:
  label: "Trefle API"
  description: >-
    Trefle is an open botanical data source and REST API for plant information
    covering over 400,000 plant species with full taxonomy, morphology, growth
    requirements, and geographic distribution data.
  tags:
    - Botany
    - Data API
    - Open Data
    - Plants
    - Science
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TREFLE_TOKEN: TREFLE_TOKEN

capability:
  consumes:
    - type: http
      namespace: trefle
      baseUri: https://trefle.io/api/v1
      description: "Trefle botanical REST API for plant taxonomy, species, and distribution data."
      authentication:
        type: apikey
        key: token
        value: "{{TREFLE_TOKEN}}"
        placement: query
      resources:
        - name: plants
          path: /plants
          description: "Search and browse plant species"
          operations:
            - name: list-plants
              method: GET
              description: "Returns a paginated list of plant species"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: search-plants
              method: GET
              description: "Search for plants by common or scientific name"
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: true
                  description: "Search query"
                - name: page
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-plant
              method: GET
              description: "Get detailed information about a specific plant"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Plant ID or slug"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: species
          path: /species
          description: "Access detailed species data"
          operations:
            - name: list-species
              method: GET
              description: "Returns a paginated list of plant species with detailed data"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                - name: filter[common_name]
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: search-species
              method: GET
              description: "Search species by common or scientific name"
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-species
              method: GET
              description: "Get comprehensive species data including morphology and distributions"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: families
          path: /families
          description: "Browse plant family taxonomy"
          operations:
            - name: list-families
              method: GET
              description: "List all plant families"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-family
              method: GET
              description: "Get a specific plant family"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: genus
          path: /genus
          description: "Browse plant genus taxonomy"
          operations:
            - name: list-genus
              method: GET
              description: "List all plant genera"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-genus
              method: GET
              description: "Get a specific plant genus"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: distributions
          path: /distributions
          description: "Access geographic distribution data"
          operations:
            - name: list-distributions
              method: GET
              description: "List all geographic distribution zones"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-plants-by-distribution
              method: GET
              description: "Get plants native or established in a specific geographic zone"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Distribution zone slug (e.g., california, france)"
                - name: filter[establishment]
                  in: query
                  type: string
                  required: false
                  description: "Filter by establishment type (native, introduced, etc.)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: trefle-rest
      resources:
        - path: /v1/plants/search
          name: plant-search
          operations:
            - method: GET
              name: search-plants
              description: "Search for plants"
              call: "trefle.search-plants"
              with:
                q: "rest.q"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/species/{id}
          name: species-detail
          operations:
            - method: GET
              name: get-species
              description: "Get species details"
              call: "trefle.get-species"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: trefle-mcp
      transport: http
      tools:
        - name: search-plants
          description: "Search Trefle botanical database for plants by common or scientific name"
          hints:
            readOnly: true
            openWorld: true
          call: "trefle.search-plants"
          with:
            q: "tools.q"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-species-detail
          description: "Get comprehensive botanical data for a plant species"
          hints:
            readOnly: true
            openWorld: false
          call: "trefle.get-species"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
